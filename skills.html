<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nour Elichrak | Skills</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    font-family: 'Raleway', sans-serif;
    color: #ccc;
    padding: 3rem 2rem;
  }
  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, #1a0a2e 0%, #0a0a0f 70%);
    z-index: 0;
  }
  .container {
    position: relative; z-index: 10;
    max-width: 750px;
    margin: 0 auto;
  }
  .back {
    display: inline-block;
    color: #555;
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 3px;
    margin-bottom: 3rem;
    transition: color 0.3s;
  }
  .back:hover { color: #c9a84c; }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: #c9a84c;
    letter-spacing: 6px;
    margin-bottom: 0.5rem;
  }
  .line {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, #c9a84c, transparent);
    margin: 1rem 0 3rem;
  }
  .section {
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s ease forwards;
    opacity: 0;
  }
  .section:nth-child(1) { animation-delay: 0.1s; }
  .section:nth-child(2) { animation-delay: 0.25s; }
  .section:nth-child(3) { animation-delay: 0.4s; }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: #c9a84c;
    letter-spacing: 4px;
    margin-bottom: 1.5rem;
  }
  .skill-item {
    margin-bottom: 1.2rem;
  }
  .skill-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 0.85rem;
    color: #888;
    letter-spacing: 1px;
  }
  .skill-bar-bg {
    height: 2px;
    background: #1a1a2e;
    width: 100%;
  }
  .skill-bar {
    height: 2px;
    background: linear-gradient(to right, #3d2b6b, #c9a84c);
    animation: grow 1.5s ease forwards;
    width: 0%;
  }
  @keyframes grow {
    to { width: var(--w); }
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
  }
  .tag {
    padding: 8px 16px;
    border: 1px solid #1e1e2e;
    font-size: 0.75rem;
    color: #666;
    letter-spacing: 2px;
    transition: all 0.3s;
  }
  .tag:hover {
    border-color: #c9a84c;
    color: #c9a84c;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <a href="home.html" class="back">← BACK</a>
  <h1>SKILLS</h1>
  <div class="line"></div>

  <div class="section">
    <div class="section-title">TECHNICAL SKILLS</div>
    <div class="skill-item">
      <div class="skill-header"><span>C Programming</span><span>80%</span></div>
      <div class="skill-bar-bg"><div class="skill-bar" style="--w: 80%"></div></div>
    </div>
    <div class="skill-item">
      <div class="skill-header"><span>Web Development</span><span>70%</span></div>
      <div class="skill-bar-bg"><div class="skill-bar" style="--w: 70%"></div></div>
    </div>
    <div class="skill-item">
      <div class="skill-header"><span>Graphic Design</span><span>85%</span></div>
      <div class="skill-bar-bg"><div class="skill-bar" style="--w: 85%"></div></div>
    </div>
    <div class="skill-item">
      <div class="skill-header"><span>Problem Solving</span><span>95%</span></div>
      <div class="skill-bar-bg"><div class="skill-bar" style="--w: 95%"></div></div>
    </div>
    <div class="skill-item">
      <div class="skill-header"><span>Mathematics</span><span>100%</span></div>
      <div class="skill-bar-bg"><div class="skill-bar" style="--w: 100%"></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">LANGUAGES</div>
    <div class="tags">
      <span class="tag">ARABIC — NATIVE</span>
      <span class="tag">FRENCH — BEGINNER</span>
<span class="tag">ENGLISH — INTERMEDIATE</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">SOFT SKILLS</div>
    <div class="tags">
      <span class="tag">LEADERSHIP</span>
      <span class="tag">TEAMWORK</span>
      <span class="tag">CREATIVITY</span>
      <span class="tag">DISCIPLINE</span>
      <span class="tag">COMMUNICATION</span>
      <span class="tag">EVENT ORGANIZATION</span>
      <span class="tag">PERSEVERANCE</span>
    </div>
  </div>

</div>
</body>
</html>
